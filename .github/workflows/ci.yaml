# CI for Product Catalog Service

name: Product Catalog Service CI

on:
  pull_request:
    branches:
      - main

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v4
          with:
            go-version: 1.22

        - name: Install Dependencies
          run: go mod download
          working-directory: src/product-catalog
        
        - name: Build
          run: go build -o product-catalog .
          working-directory: src/product-catalog

        - name: Run Tests
          run: go test ./...
          working-directory: src/product-catalog
    
    code-quality:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v4
          with:
            go-version: 1.22

        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v4
          with:
            version: v1.56.2
            working-directory: src/product-catalog

    docker:
      runs-on: ubuntu-latest

      needs: build

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Docker
          uses: docker/setup-buildx-action@v2
        
        - name: Log in to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}
        
        - name: Build and Push Docker Image
          uses: docker/build-push-action@v6
          with:
            context: src/product-catalog 
            file: src/product-catalog/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}

    updatek8s:
      runs-on: ubuntu-latest

      needs: docker

      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
          
        - name: Update tag in k8s deployment manifest
          run: |
            sed -i 's|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|' kubernetes/productcatalog/deploy.yaml

        - name: commit and push changes
          run: |
            git config --global user.email "vicky12chitte@gmail.com"
            git config --global user.name "Vikrant Chitte"
            git add kubernetes/productcatalog/deploy.yaml
            git commit -m "[CI] Update image tag for product catalog deployment"
            git push